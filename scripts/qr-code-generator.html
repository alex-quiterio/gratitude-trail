<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>QR Code Generator</title>
        <style>
            :root {
                --bg: #f5f0e8;
                --surface: #fffdf7;
                --ink: #1a1a18;
                --ink-light: #6b6860;
                --accent: #e8553d;
                --accent-hover: #d14a34;
                --border: #e0d9cc;
                --shadow: rgba(26, 26, 24, 0.06);
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: var(--bg);
                color: var(--ink);
                font-family: "Georgia", "Times New Roman", serif;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 48px 24px 80px;
            }

            header {
                text-align: center;
                margin-bottom: 40px;
            }

            header h1 {
                font-size: 2.2rem;
                font-weight: 400;
                letter-spacing: -0.02em;
                margin-bottom: 6px;
            }

            header p {
                font-family: "Helvetica Neue", Helvetica, sans-serif;
                font-size: 0.85rem;
                color: var(--ink-light);
                letter-spacing: 0.04em;
                text-transform: uppercase;
            }

            .card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 12px;
                box-shadow:
                    0 2px 12px var(--shadow),
                    0 1px 3px var(--shadow);
                width: 100%;
                max-width: 680px;
                padding: 36px;
            }

            .mode-toggle {
                display: flex;
                gap: 0;
                margin-bottom: 24px;
                border: 1.5px solid var(--border);
                border-radius: 8px;
                overflow: hidden;
            }

            .mode-toggle button {
                flex: 1;
                padding: 10px 16px;
                border: none;
                background: var(--bg);
                font-family: "Helvetica Neue", Helvetica, sans-serif;
                font-size: 0.8rem;
                font-weight: 600;
                letter-spacing: 0.04em;
                text-transform: uppercase;
                color: var(--ink-light);
                cursor: pointer;
                transition: all 0.2s;
            }

            .mode-toggle button.active {
                background: var(--accent);
                color: white;
            }

            .mode-toggle button:not(:last-child) {
                border-right: 1.5px solid var(--border);
            }

            .input-group {
                margin-bottom: 24px;
            }

            .input-group label {
                display: block;
                font-family: "Helvetica Neue", Helvetica, sans-serif;
                font-size: 0.7rem;
                font-weight: 600;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: var(--ink-light);
                margin-bottom: 8px;
            }

            .input-group textarea {
                width: 100%;
                min-height: 80px;
                padding: 14px 16px;
                border: 1.5px solid var(--border);
                border-radius: 8px;
                font-family: "Helvetica Neue", Helvetica, sans-serif;
                font-size: 0.95rem;
                color: var(--ink);
                background: var(--bg);
                resize: vertical;
                transition: border-color 0.2s;
                outline: none;
            }

            .input-group textarea:focus {
                border-color: var(--accent);
            }

            .input-group textarea::placeholder {
                color: #b5afa3;
            }

            .input-group textarea.batch-input {
                min-height: 180px;
                font-size: 0.82rem;
                font-family: "SF Mono", "Menlo", "Monaco", monospace;
                line-height: 1.6;
            }

            .format-hint {
                font-family: "Helvetica Neue", Helvetica, sans-serif;
                font-size: 0.72rem;
                color: var(--ink-light);
                margin-top: 6px;
                line-height: 1.5;
            }

            .format-hint code {
                background: var(--bg);
                padding: 1px 5px;
                border-radius: 3px;
                font-size: 0.7rem;
            }

            .options-row {
                display: flex;
                gap: 16px;
                margin-bottom: 28px;
            }

            .option {
                flex: 1;
            }

            .option label {
                display: block;
                font-family: "Helvetica Neue", Helvetica, sans-serif;
                font-size: 0.7rem;
                font-weight: 600;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: var(--ink-light);
                margin-bottom: 8px;
            }

            .option select {
                width: 100%;
                padding: 10px 12px;
                border: 1.5px solid var(--border);
                border-radius: 8px;
                font-family: "Helvetica Neue", Helvetica, sans-serif;
                font-size: 0.85rem;
                color: var(--ink);
                background: var(--bg);
                cursor: pointer;
                outline: none;
                transition: border-color 0.2s;
                appearance: none;
                -webkit-appearance: none;
                background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l5 6 5-6z' fill='%236B6860'/%3E%3C/svg%3E");
                background-repeat: no-repeat;
                background-position: right 12px center;
                padding-right: 32px;
            }

            .option select:focus {
                border-color: var(--accent);
            }

            .color-pair {
                display: flex;
                gap: 8px;
                align-items: center;
            }

            .color-swatch {
                width: 38px;
                height: 38px;
                border: 1.5px solid var(--border);
                border-radius: 8px;
                cursor: pointer;
                overflow: hidden;
                position: relative;
            }

            .color-swatch input[type="color"] {
                position: absolute;
                top: -4px;
                left: -4px;
                width: calc(100% + 8px);
                height: calc(100% + 8px);
                border: none;
                padding: 0;
                cursor: pointer;
            }

            .color-label {
                font-family: "Helvetica Neue", Helvetica, sans-serif;
                font-size: 0.75rem;
                color: var(--ink);
                background: var(--bg);
                border: 1.5px solid var(--border);
                border-radius: 6px;
                padding: 6px 8px;
                width: 80px;
                outline: none;
                transition: border-color 0.2s;
            }

            .color-label:focus {
                border-color: var(--accent);
            }

            /* Single mode */
            .qr-canvas-wrap {
                display: flex;
                justify-content: center;
                align-items: center;
                margin: 0 auto 28px;
                padding: 28px;
                border: 2px dashed var(--border);
                border-radius: 8px;
                background: white;
                min-height: 200px;
                transition: border-color 0.3s;
                position: relative;
            }

            .qr-canvas-wrap.has-qr {
                border-color: transparent;
                border-style: solid;
            }

            .qr-placeholder {
                font-family: "Helvetica Neue", Helvetica, sans-serif;
                font-size: 0.85rem;
                color: #c5bfb3;
                text-align: center;
                line-height: 1.6;
            }

            canvas.qr-canvas {
                image-rendering: pixelated;
            }

            .char-count {
                font-family: "Helvetica Neue", Helvetica, sans-serif;
                font-size: 0.72rem;
                color: var(--ink-light);
                text-align: right;
                margin-top: 6px;
            }

            .char-count.warn {
                color: var(--accent);
            }

            .actions {
                display: flex;
                gap: 12px;
            }

            .btn {
                flex: 1;
                padding: 14px 20px;
                border: none;
                border-radius: 8px;
                font-family: "Helvetica Neue", Helvetica, sans-serif;
                font-size: 0.85rem;
                font-weight: 600;
                letter-spacing: 0.02em;
                cursor: pointer;
                transition: all 0.2s;
            }

            .btn-primary {
                background: var(--accent);
                color: white;
            }

            .btn-primary:hover {
                background: var(--accent-hover);
                transform: translateY(-1px);
            }
            .btn-primary:active {
                transform: translateY(0);
            }

            .btn-secondary {
                background: var(--bg);
                color: var(--ink);
                border: 1.5px solid var(--border);
            }

            .btn-secondary:hover {
                background: #ede8dd;
            }
            .btn-secondary:disabled {
                opacity: 0.4;
                cursor: not-allowed;
            }

            .error-msg {
                font-family: "Helvetica Neue", Helvetica, sans-serif;
                font-size: 0.8rem;
                color: var(--accent);
                margin-bottom: 16px;
                display: none;
            }

            .error-msg.show {
                display: block;
            }

            /* Batch results grid */
            .batch-results {
                margin-top: 32px;
                display: none;
            }

            .batch-results.show {
                display: block;
            }

            .batch-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 20px;
                padding-bottom: 12px;
                border-bottom: 1.5px solid var(--border);
            }

            .batch-header h2 {
                font-size: 1.1rem;
                font-weight: 400;
            }

            .batch-count {
                font-family: "Helvetica Neue", Helvetica, sans-serif;
                font-size: 0.75rem;
                color: var(--ink-light);
                text-transform: uppercase;
                letter-spacing: 0.06em;
            }

            .qr-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
                gap: 20px;
            }

            .qr-card {
                background: white;
                border: 1px solid var(--border);
                border-radius: 10px;
                padding: 20px;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 14px;
                transition: box-shadow 0.2s;
            }

            .qr-card:hover {
                box-shadow: 0 4px 16px var(--shadow);
            }

            .qr-card canvas {
                image-rendering: pixelated;
            }

            .qr-card-title {
                font-family: "Helvetica Neue", Helvetica, sans-serif;
                font-size: 0.78rem;
                font-weight: 600;
                color: var(--ink);
                text-align: center;
                line-height: 1.4;
                word-break: break-word;
            }

            .qr-card-url {
                font-family: "SF Mono", "Menlo", monospace;
                font-size: 0.65rem;
                color: var(--ink-light);
                text-align: center;
                word-break: break-all;
                line-height: 1.3;
                max-height: 2.6em;
                overflow: hidden;
            }

            .qr-card .btn-dl {
                width: 100%;
                padding: 8px 12px;
                border: 1.5px solid var(--border);
                border-radius: 6px;
                background: var(--bg);
                font-family: "Helvetica Neue", Helvetica, sans-serif;
                font-size: 0.72rem;
                font-weight: 600;
                color: var(--ink);
                cursor: pointer;
                transition: all 0.2s;
                text-transform: uppercase;
                letter-spacing: 0.04em;
            }

            .qr-card .btn-dl:hover {
                background: #ede8dd;
            }

            .hidden {
                display: none !important;
            }

            .save-modal-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(26, 26, 24, 0.6);
                z-index: 1000;
                align-items: center;
                justify-content: center;
                padding: 24px;
            }

            .save-modal-overlay.show {
                display: flex;
            }

            .save-modal {
                background: var(--surface);
                border-radius: 14px;
                padding: 32px;
                max-width: 440px;
                width: 100%;
                text-align: center;
                box-shadow: 0 16px 48px rgba(0, 0, 0, 0.2);
                position: relative;
            }

            .save-modal-close {
                position: absolute;
                top: 12px;
                right: 16px;
                background: none;
                border: none;
                font-size: 1.4rem;
                color: var(--ink-light);
                cursor: pointer;
                line-height: 1;
                padding: 4px;
            }

            .save-modal-close:hover {
                color: var(--ink);
            }

            .save-modal h3 {
                font-size: 1rem;
                font-weight: 400;
                margin-bottom: 6px;
            }

            .save-modal .save-hint {
                font-family: "Helvetica Neue", Helvetica, sans-serif;
                font-size: 0.78rem;
                color: var(--ink-light);
                margin-bottom: 20px;
                line-height: 1.5;
            }

            .save-modal img {
                max-width: 320px;
                width: 100%;
                image-rendering: pixelated;
                border: 1px solid var(--border);
                border-radius: 6px;
                background: white;
            }

            .save-modal .save-filename {
                font-family: "SF Mono", "Menlo", monospace;
                font-size: 0.7rem;
                color: var(--ink-light);
                margin-top: 12px;
            }

            @media print {
                title {
                    display: none important!;
                    font-size: 1px;
                }
                body {
                    background: white;
                    padding: 20px;
                }
                .card {
                    box-shadow: none;
                    border: none;
                    padding: 0;
                    max-width: 100%;
                }
                .input-group,
                .options-row,
                .actions,
                header p,
                .char-count,
                .error-msg,
                .mode-toggle,
                .format-hint,
                .btn-dl {
                    display: none !important;
                }
                .qr-canvas-wrap {
                    border: none;
                    padding: 0;
                }
                header h1 {
                    font-size: 1.4rem;
                    margin-bottom: 20px;
                }
                .batch-results {
                    display: block !important;
                }
                .qr-grid {
                    grid-template-columns: repeat(3, 1fr);
                    gap: 16px;
                }
                .qr-card {
                    break-inside: avoid;
                    box-shadow: none;
                    border: 1px solid #ddd;
                }
                .batch-header {
                    border-bottom-color: #ddd;
                }
            }
        </style>
    </head>
    <body>
        <header>
            <h1>QR Code Generator</h1>
            <p>Single or batch &middot; Download as PNG</p>
        </header>

        <div class="card">
            <div class="mode-toggle">
                <button id="mode-single" class="active">Single</button>
                <button id="mode-batch">Batch (CSV)</button>
            </div>

            <!-- Single mode input -->
            <div class="input-group" id="single-input-group">
                <label for="qr-input">Content</label>
                <textarea
                    id="qr-input"
                    placeholder="Paste a URL or type any text…"
                    spellcheck="false"
                ></textarea>
                <div class="char-count" id="char-count">0 / 2,953</div>
            </div>

            <!-- Batch mode input -->
            <div class="input-group hidden" id="batch-input-group">
                <label for="batch-input">CSV Data</label>
                <textarea
                    id="batch-input"
                    class="batch-input"
                    placeholder="URL;Title&#10;https://example.com/page-1;My First Page&#10;https://example.com/page-2;My Second Page"
                    spellcheck="false"
                ></textarea>
                <div class="format-hint">
                    Format: <code>URL;Title</code> &mdash; one per line. First
                    line can be a header row and will be skipped.
                </div>
            </div>

            <div class="options-row">
                <div class="option">
                    <label>Error Correction</label>
                    <select id="ec-level">
                        <option value="L">Low (7%)</option>
                        <option value="M" selected>Medium (15%)</option>
                        <option value="Q">Quartile (25%)</option>
                        <option value="H">High (30%)</option>
                    </select>
                </div>
                <div class="option">
                    <label>Module Size</label>
                    <select id="mod-size">
                        <option value="6">Small</option>
                        <option value="10" selected>Medium</option>
                        <option value="16">Large</option>
                        <option value="24">X-Large</option>
                    </select>
                </div>
            </div>

            <div class="options-row">
                <div class="option">
                    <label>Foreground</label>
                    <div class="color-pair">
                        <div class="color-swatch">
                            <input type="color" id="fg-color" value="#E53C43" />
                        </div>
                        <input
                            type="text"
                            class="color-label"
                            id="fg-label"
                            value="#E53C43"
                            maxlength="7"
                            spellcheck="false"
                        />
                    </div>
                </div>
                <div class="option">
                    <label>Background</label>
                    <div class="color-pair">
                        <div class="color-swatch">
                            <input type="color" id="bg-color" value="#FFFFFF" />
                        </div>
                        <input
                            type="text"
                            class="color-label"
                            id="bg-label"
                            value="#FFFFFF"
                            maxlength="7"
                            spellcheck="false"
                        />
                    </div>
                </div>
            </div>

            <div class="error-msg" id="error-msg"></div>

            <!-- Single mode output -->
            <div id="single-output">
                <div class="qr-canvas-wrap" id="qr-wrap">
                    <div class="qr-placeholder" id="qr-placeholder">
                        Your QR code will<br />appear here
                    </div>
                    <canvas
                        class="qr-canvas"
                        id="qr-canvas"
                        style="display: none"
                    ></canvas>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" id="generate-btn">
                    Generate
                </button>
                <button class="btn btn-secondary" id="download-btn" disabled>
                    Download PNG
                </button>
            </div>

            <!-- Batch mode output -->
            <div class="batch-results" id="batch-results">
                <div class="batch-header">
                    <h2>Generated Codes</h2>
                    <span class="batch-count" id="batch-count"></span>
                </div>
                <div class="qr-grid" id="qr-grid"></div>
            </div>
        </div>

        <div class="save-modal-overlay" id="save-modal">
            <div class="save-modal">
                <button class="save-modal-close" id="save-modal-close">
                    &times;
                </button>
                <h3>Save Your QR Code</h3>
                <div class="save-hint">
                    Right-click (or long-press on mobile) the image below and
                    choose <strong>Save Image As</strong>
                </div>
                <a id="save-modal-link" download="qrcode.png"
                    ><img id="save-modal-img" src="" alt="QR Code"
                /></a>
                <div class="save-filename" id="save-modal-filename"></div>
            </div>
        </div>

                        const factor = GF_EXP[i];
                        for (let j = 0; j < poly.length; j++) {

                    const bytes = new TextEncoder().encode(text);
                    let bits = "";

                    bits += bytes.length.toString(2).padStart(ccLen, "0");
                    for (const b of bytes)

                        ecBlocks = [];

                            dataArr.slice(offset, offset + dataPerB2),
                        );
                        blocks.push(block);
                        ecBlocks.push(rsEncode(block, ecPerBlock));
                        offset += dataPerB2;

                    for (let i = 0; i < maxDataLen; i++) {
                        for (const block of blocks) {

                        for (const block of ecBlocks) {

                                mc < 0 ||

                                (c >= 0 && c <= 6 && (r === 0 || r === 6)) ||

                            for (let i = 0; i < 11; i++) {

                                if (v !== pat2[i]) m2 = false;

                        for (let c = 0; c < size; c++)

                        placeFormatInfo(masked, ecLevel, m);
                        placeVersionInfo(masked, version);
                        const s = penalty(masked);
                        if (s < bestScore) {
                            bestScore = s;
                            bestMatrix = masked;
                        }

                    return {
                        matrix: bestMatrix,
                        version,
                        size: getSize(version),

                dlBtn.classList.toggle("hidden", mode !== "single");
                if (mode === "single") {
                    batchResults.classList.remove("show");
                    genBtn.textContent = "Generate";
                } else {
                    genBtn.textContent = "Generate All";
                }
                clearError();
            }

            function updateCharCount() {
                const bytes = new TextEncoder().encode(input.value);
                const ecIdx = QR.EC_LEVELS[ecSelect.value];
                const maxCap = QR.CAPACITY[40][ecIdx];
                charCount.textContent = `${bytes.length} / ${maxCap.toLocaleString()}`;
                charCount.className =
                    "char-count" + (bytes.length > maxCap ? " warn" : "");
            }

            input.addEventListener("input", updateCharCount);
            ecSelect.addEventListener("change", updateCharCount);

            fgInput.addEventListener("input", () => {
                fgLabel.value = fgInput.value.toUpperCase();
                if (currentQR && currentMode === "single") renderQR();
            });
            bgInput.addEventListener("input", () => {
                bgLabel.value = bgInput.value.toUpperCase();
                if (currentQR && currentMode === "single") renderQR();
            });

            function syncColorFromText(textInput, colorInput) {
                let val = textInput.value.trim();
                if (!val.startsWith("#")) val = "#" + val;
                if (/^#[0-9A-Fa-f]{6}$/.test(val)) {
                    colorInput.value = val;
                    textInput.value = val.toUpperCase();
                    if (currentQR && currentMode === "single") renderQR();
                }
            }

            fgLabel.addEventListener("input", () =>
                syncColorFromText(fgLabel, fgInput),
            );
            bgLabel.addEventListener("input", () =>
                syncColorFromText(bgLabel, bgInput),
            );
            fgLabel.addEventListener("blur", () =>
                syncColorFromText(fgLabel, fgInput),
            );
            bgLabel.addEventListener("blur", () =>
                syncColorFromText(bgLabel, bgInput),
            );

            function renderToCanvas(
                targetCanvas,
                qrResult,
                modSize,
                fgColor,
                bgColor,
                displayWidth,
            ) {
                const { matrix, size } = qrResult;
                const quiet = 4;
                const totalSize = (size + quiet * 2) * modSize;
                targetCanvas.width = totalSize;
                targetCanvas.height = totalSize;
                if (displayWidth) {
                    targetCanvas.style.width = displayWidth + "px";
                    targetCanvas.style.height = displayWidth + "px";
                }
                const ctx = targetCanvas.getContext("2d");
                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, totalSize, totalSize);
                ctx.fillStyle = fgColor;
                for (let r = 0; r < size; r++) {
                    for (let c = 0; c < size; c++) {
                        if (matrix[r][c] > 0) {
                            ctx.fillRect(
                                (c + quiet) * modSize,
                                (r + quiet) * modSize,
                                modSize,
                                modSize,
                            );
                        }
                    }
                }
            }

            function renderQR() {
                if (!currentQR) return;
                const modSize = parseInt(modSelect.value);
                renderToCanvas(
                    canvas,
                    currentQR,
                    modSize,
                    fgInput.value,
                    bgInput.value,
                    Math.min((currentQR.size + 8) * modSize, 320),
                );
                canvas.style.display = "block";
                placeholder.style.display = "none";
                wrap.classList.add("has-qr");
                dlBtn.disabled = false;
            }

            function showError(msg) {
                errorMsg.textContent = msg;
                errorMsg.classList.add("show");
            }
            function clearError() {
                errorMsg.classList.remove("show");
            }

            function downloadCanvas(targetCanvas, filename) {
                const dataUrl = targetCanvas.toDataURL("image/png");
                const modal = document.getElementById("save-modal");
                const img = document.getElementById("save-modal-img");
                const link = document.getElementById("save-modal-link");
                const fnEl = document.getElementById("save-modal-filename");
                img.src = dataUrl;
                img.alt = filename;
                link.href = dataUrl;
                link.download = filename;
                fnEl.textContent = filename;
                modal.classList.add("show");
            }

            document
                .getElementById("save-modal-close")
                .addEventListener("click", () => {
                    document
                        .getElementById("save-modal")
                        .classList.remove("show");
                });
            document
                .getElementById("save-modal")
                .addEventListener("click", (e) => {
                    if (e.target === e.currentTarget)
                        e.currentTarget.classList.remove("show");
                });

            function slugify(text) {
                return text
                    .toLowerCase()
                    .replace(/[^a-z0-9]+/g, "-")
                    .replace(/^-|-$/g, "")
                    .substring(0, 60);
            }

            function parseBatchInput(text) {
                const lines = text
                    .split("\n")
                    .map((l) => l.trim())
                    .filter((l) => l.length > 0);
                if (lines.length === 0) return [];

                // Detect if first line is a header
                const firstLine = lines[0].toLowerCase();
                const startIdx =
                    (firstLine.includes("url") &&
                        firstLine.includes("title")) ||
                    (firstLine.includes("url") && firstLine.includes("qr"))
                        ? 1
                        : 0;

                const entries = [];
                for (let i = startIdx; i < lines.length; i++) {
                    const sep = lines[i].indexOf(";");
                    if (sep === -1) {
                        entries.push({ url: lines[i], title: lines[i] });
                    } else {
                        const url = lines[i].substring(0, sep).trim();
                        const title = lines[i].substring(sep + 1).trim() || url;
                        if (url) entries.push({ url, title });
                    }
                }
                return entries;
            }

            function generateBatch() {
                clearError();
                const entries = parseBatchInput(batchInput.value);
                if (entries.length === 0) {
                    showError(
                        "Paste at least one line of CSV data (URL;Title).",
                    );
                    return;
                }

                const ecLevel = ecSelect.value;
                const modSize = parseInt(modSelect.value);
                const fg = fgInput.value;
                const bg = bgInput.value;

                qrGrid.innerHTML = "";
                let errorCount = 0;

                for (const entry of entries) {
                    const result = QR.generate(entry.url, ecLevel);
                    if (!result) {
                        errorCount++;
                        continue;
                    }

                    const card = document.createElement("div");
                    card.className = "qr-card";

                    const c = document.createElement("canvas");
                    c.className = "qr-canvas";
                    const displaySize = 160;
                    renderToCanvas(c, result, modSize, fg, bg, displaySize);

                    const titleEl = document.createElement("div");
                    titleEl.className = "qr-card-title";
                    titleEl.textContent = entry.title;

                    const urlEl = document.createElement("div");
                    urlEl.className = "qr-card-url";
                    urlEl.textContent = entry.url;

                    const dlButton = document.createElement("button");
                    dlButton.className = "btn-dl";
                    dlButton.textContent = "Download PNG";
                    dlButton.addEventListener("click", () => {
                        downloadCanvas(c, slugify(entry.title) + ".png");
                    });

                    card.appendChild(c);
                    card.appendChild(titleEl);
                    card.appendChild(urlEl);
                    card.appendChild(dlButton);
                    qrGrid.appendChild(card);
                }

                const successCount = entries.length - errorCount;
                batchCount.textContent =
                    successCount +
                    " code" +
                    (successCount !== 1 ? "s" : "") +
                    (errorCount > 0 ? ` (${errorCount} failed)` : "");
                batchResults.classList.add("show");

                if (errorCount > 0) {
                    showError(
                        `${errorCount} QR code(s) failed to generate. Input may be too long for the selected error correction level.`,
                    );
                }
            }

            genBtn.addEventListener("click", () => {
                if (currentMode === "batch") {
                    generateBatch();
                    return;
                }

                clearError();
                const text = input.value.trim();
                if (!text) {
                    showError("Enter some text or a URL to encode.");
                    return;
                }
                const bytes = new TextEncoder().encode(text);
                const ecIdx = QR.EC_LEVELS[ecSelect.value];
                const maxCap = QR.CAPACITY[40][ecIdx];
                if (bytes.length > maxCap) {
                    showError(
                        `Input too long (${bytes.length} bytes). Max ${maxCap} bytes at this error correction level.`,
                    );
                    return;
                }
                const result = QR.generate(text, ecSelect.value);
                if (!result) {
                    showError(
                        "Failed to generate QR code. Try shorter input or lower error correction.",
                    );
                    return;
                }
                currentQR = result;
                renderQR();
            });

            modSelect.addEventListener("change", () => {
                if (currentQR && currentMode === "single") renderQR();
            });

            dlBtn.addEventListener("click", () => {
                if (!currentQR) return;
                downloadCanvas(
                    canvas,
                    slugify(input.value.trim() || "qrcode") + ".png",
                );
            });

            input.addEventListener("keydown", (e) => {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    genBtn.click();
                }
            });

            updateCharCount();
        </script>
    </body>
</html>
