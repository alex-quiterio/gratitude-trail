services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gratitude
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations/0001_init.sql:/docker-entrypoint-initdb.d/01_init.sql

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      POSTGRES_URL: postgres://postgres:postgres@postgres:5432/gratitude
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
    depends_on:
      - postgres

volumes:
  postgres_data:
